<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Risk System - Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 50px 40px; width: 400px; box-shadow: 0 25px 45px rgba(0,0,0,0.3); }
  .logo { text-align: center; margin-bottom: 30px; }
  .logo h1 { color: #fff; font-size: 24px; font-weight: 700; }
  .logo p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 5px; }
  .shield { font-size: 48px; margin-bottom: 10px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 8px; }
  input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; font-size: 14px; outline: none; transition: all 0.3s; }
  input:focus { border-color: #6c63ff; background: rgba(108,99,255,0.1); }
  input::placeholder { color: rgba(255,255,255,0.3); }
  button { width: 100%; padding: 14px; background: linear-gradient(135deg, #6c63ff, #3b82f6); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(108,99,255,0.4); }
  .error { color: #ff6b6b; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
  .hint { color: rgba(255,255,255,0.3); font-size: 12px; text-align: center; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="shield">🛡️</div>
    <h1>Credit Risk System</h1>
    <p>Secure AI-Powered Scoring Platform</p>
  </div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />
  </div>
  <button onclick="login()">Login Securely</button>
  <div class="error" id="error">Invalid credentials. Try again.</div>
  <p class="hint">Demo: admin / admin123</p>
</div>
<script>
async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const form = new URLSearchParams();
  form.append('username', username);
  form.append('password', password);
  const res = await fetch('/token', { method: 'POST', body: form });
  if (res.ok) {
    const data = await res.json();
    localStorage.setItem('token', data.access_token);
    window.location.href = '/dashboard';
  } else {
    document.getElementById('error').style.display = 'block';
  }
}
document.addEventListener('keypress', e => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>
