<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Credit Risk System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #fff; min-height: 100vh; }
  nav { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
  nav h1 { font-size: 18px; font-weight: 700; }
  nav h1 span { color: #6c63ff; }
  .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; margin-left: 24px; font-size: 14px; transition: color 0.2s; }
  .nav-links a:hover { color: #6c63ff; }
  .logout { background: rgba(255,100,100,0.15); border: 1px solid rgba(255,100,100,0.3); color: #ff6b6b !important; padding: 6px 14px; border-radius: 8px; }
  .container { padding: 32px; max-width: 1200px; margin: 0 auto; }
  h2 { font-size: 22px; margin-bottom: 24px; color: rgba(255,255,255,0.9); }
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
  .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; }
  .stat-card .label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 32px; font-weight: 700; }
  .stat-card.total .value { color: #6c63ff; }
  .stat-card.high .value { color: #ff6b6b; }
  .stat-card.med .value { color: #ffa500; }
  .stat-card.low .value { color: #51cf66; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .chart-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; }
  .chart-card h3 { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 20px; }
  canvas { max-height: 280px; }
</style>
</head>
<body>
<nav>
  <h1>🛡️ Credit <span>Risk</span> System</h1>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/lookup">Account Lookup</a>
    <a href="#" class="logout" onclick="logout()">Logout</a>
  </div>
</nav>
<div class="container">
  <h2>📊 Risk Dashboard</h2>
  <div class="cards">
    <div class="stat-card total"><div class="label">Total Accounts</div><div class="value" id="total">—</div></div>
    <div class="stat-card high"><div class="label">High Risk</div><div class="value" id="high">—</div></div>
    <div class="stat-card med"><div class="label">Medium Risk</div><div class="value" id="med">—</div></div>
    <div class="stat-card low"><div class="label">Low Risk</div><div class="value" id="low">—</div></div>
  </div>
  <div class="charts">
    <div class="chart-card"><h3>Risk Distribution</h3><canvas id="pieChart"></canvas></div>
    <div class="chart-card"><h3>Score Histogram</h3><canvas id="barChart"></canvas></div>
  </div>
</div>
<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/';

async function loadStats() {
  const res = await fetch('/api/stats', { headers: { 'Authorization': 'Bearer ' + token }});
  if (res.status === 401) { window.location.href = '/'; return; }
  const d = await res.json();
  document.getElementById('total').textContent = d.total.toLocaleString();
  document.getElementById('high').textContent = d.high_risk.toLocaleString();
  document.getElementById('med').textContent = d.med_risk.toLocaleString();
  document.getElementById('low').textContent = d.low_risk.toLocaleString();

  new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: ['High Risk', 'Medium Risk', 'Low Risk'],
      datasets: [{ data: [d.high_risk, d.med_risk, d.low_risk],
        backgroundColor: ['#ff6b6b','#ffa500','#51cf66'], borderWidth: 0 }]},
    options: { plugins: { legend: { labels: { color: '#fff' }}}}
  });

  const labels = d.histogram.bins.slice(0,-1).map((b,i) => b.toFixed(2) + '-' + d.histogram.bins[i+1].toFixed(2));
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels,
      datasets: [{ label: 'Accounts', data: d.histogram.counts,
        backgroundColor: '#6c63ff', borderRadius: 6 }]},
    options: { plugins: { legend: { labels: { color: '#fff' }}},
      scales: { x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.05)' }},
                y: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.05)' }}}}
  });
}

function logout() { localStorage.removeItem('token'); window.location.href = '/'; }
loadStats();
</script>
</body>
</html>
